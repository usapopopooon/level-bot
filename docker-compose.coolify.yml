services:
  bot:
    build: .
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    mem_limit: ${BOT_MEMORY_LIMIT:-384m}
    cpus: "${BOT_CPUS:-0.75}"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-level}:${SERVICE_PASSWORD_POSTGRES:-level-postgres-password}@postgres:5432/${POSTGRES_DB:-level_bot}
      DATABASE_REQUIRE_SSL: ${DATABASE_REQUIRE_SSL:-false}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      BOT_ENABLED: ${BOT_ENABLED:-false}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      TIMEZONE_OFFSET: ${TIMEZONE_OFFSET:-9}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_URL: ${APP_URL:-http://localhost:8000}
      PUBLIC_DASHBOARD: ${PUBLIC_DASHBOARD:-true}
      USER_STATS_SITE_GUILD_ID: ${USER_STATS_SITE_GUILD_ID:-}
      USER_STATS_SITE_BASE_URL: ${USER_STATS_SITE_BASE_URL:-}
      INTRO_API_BASE_URL: ${INTRO_API_BASE_URL:-}
      INTRO_API_KEY: ${INTRO_API_KEY:-}
      CHILL_API_KEY: ${CHILL_API_KEY:-${EXTERNAL_API_KEY:-}}
    command:
      [
        "sh",
        "-lc",
        'if [ "$${BOT_ENABLED}" != "true" ]; then echo "bot disabled; set BOT_ENABLED=true after stopping the Railway bot"; sleep infinity; fi; ./scripts/start-bot.sh',
      ]

  api:
    build: .
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    mem_limit: ${API_MEMORY_LIMIT:-384m}
    cpus: "${API_CPUS:-0.75}"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-level}:${SERVICE_PASSWORD_POSTGRES:-level-postgres-password}@postgres:5432/${POSTGRES_DB:-level_bot}
      DATABASE_REQUIRE_SSL: ${DATABASE_REQUIRE_SSL:-false}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      PORT: ${API_PORT:-8000}
      TIMEZONE_OFFSET: ${TIMEZONE_OFFSET:-9}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      APP_URL: ${APP_URL:-http://localhost:8000}
      PUBLIC_DASHBOARD: ${PUBLIC_DASHBOARD:-true}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:?set SESSION_SECRET_KEY}
      SECURE_COOKIE: ${SECURE_COOKIE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      EXTERNAL_API_KEY: ${EXTERNAL_API_KEY:-}
      CHILL_API_KEY: ${CHILL_API_KEY:-${EXTERNAL_API_KEY:-}}
      USER_STATS_SITE_GUILD_ID: ${USER_STATS_SITE_GUILD_ID:-}
      USER_STATS_SITE_BASE_URL: ${USER_STATS_SITE_BASE_URL:-}
    command: ["./scripts/start-api.sh"]
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://api:8000
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    mem_limit: ${FRONTEND_MEMORY_LIMIT:-384m}
    cpus: "${FRONTEND_CPUS:-1.00}"
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8000
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_JOIN_SERVER_URL: ${NEXT_PUBLIC_JOIN_SERVER_URL:-https://discord.com/invite/chill-cafe}
    expose:
      - "3000"

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-256m}
    cpus: "${POSTGRES_CPUS:-0.50}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-level_bot}
      POSTGRES_USER: ${POSTGRES_USER:-level}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES:-level-postgres-password}
    volumes:
      - postgres18-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres18-data:
