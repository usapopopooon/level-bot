# Railway 側ではこのサービスの "Root Directory" を `frontend/` に設定する。
# その結果、build context = frontend/、dockerfilePath は frontend/ 起点の相対パス。

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
numReplicas = 1
sleepApplication = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
